name: Branch Brief

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

permissions:
  contents: read
  pull-requests: read

jobs:
  branchbrief:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build local CLI
        run: npm run build

      - name: Generate branch brief
        run: |
          node dist/cli.js --base "origin/${{ github.base_ref }}" --output BRANCH_BRIEF.md --copilot

      - name: Add branch brief to job summary
        run: |
          cat BRANCH_BRIEF.md >> "$GITHUB_STEP_SUMMARY"

      - name: Upload branch brief artifact
        uses: actions/upload-artifact@v7
        with:
          name: branch-brief
          path: BRANCH_BRIEF.md
