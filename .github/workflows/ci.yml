name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Run helper tests
        run: node --test tests/github/*.test.mjs tests/risk/*.test.mjs

      - name: Check whitespace
        run: git diff --check
